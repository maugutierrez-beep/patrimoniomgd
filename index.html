<style>
:root{
  --navy:#0B2545; --navy-900:#08182F; --navy-700:#13355F;
  --bg:#EAEEF3; --surface:#FFFFFF; --line:#DCE3EC; --line-soft:#EAF0F6;
  --ink:#0B2545; --muted:#5B6B7F; --muted-2:#8A98A8;
  --brass:#B0863A; --brass-soft:#F3E7CF;
  --pos:#1E7A5A; --pos-soft:#E2F1EA; --neg:#B23A48; --neg-soft:#F7E5E7;
  --shadow:0 1px 2px rgba(11,37,69,.06),0 8px 24px rgba(11,37,69,.06);
  --r:14px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink);
  -webkit-font-smoothing:antialiased;font-variant-numeric:tabular-nums;line-height:1.45}
.num{font-variant-numeric:tabular-nums;letter-spacing:-.01em}
a{color:inherit}
button{font-family:inherit;cursor:pointer}
.wrap{max-width:1120px;margin:0 auto;padding:0 18px 80px}

/* Top bar */
.topbar{background:var(--navy);color:#fff;border-bottom:3px solid var(--brass)}
.topbar .inner{max-width:1120px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brand{display:flex;flex-direction:column;line-height:1.1}
.brand .b1{font-weight:700;font-size:15px;letter-spacing:.14em}
.brand .b2{font-size:11px;letter-spacing:.22em;color:#9DB2CC;text-transform:uppercase;margin-top:3px}
.spacer{flex:1}
.ccy{display:inline-flex;border:1px solid rgba(255,255,255,.25);border-radius:999px;overflow:hidden}
.ccy button{background:transparent;color:#cdd9e8;border:0;padding:7px 16px;font-weight:600;font-size:13px;letter-spacing:.04em}
.ccy button.on{background:var(--brass);color:#1c1303}
.status{font-size:11px;color:#9DB2CC;display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;background:#6FCF97;display:inline-block}
.dot.local{background:#E2B33A}

/* Tabs */
.tabs{display:flex;gap:2px;flex-wrap:wrap;margin:18px 0 22px;background:var(--surface);
  border:1px solid var(--line);border-radius:999px;padding:4px;box-shadow:var(--shadow);width:fit-content}
.tabs button{border:0;background:transparent;color:var(--muted);padding:9px 18px;border-radius:999px;
  font-weight:600;font-size:13.5px;letter-spacing:.01em}
.tabs button.on{background:var(--navy);color:#fff}

/* Cards */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.grid{display:grid;gap:16px}

/* Hero */
.hero{padding:26px 28px;display:grid;grid-template-columns:1.1fr 1fr;gap:24px;align-items:center}
.hero .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted-2);font-weight:600}
.hero .nw{font-family:Fraunces,serif;font-weight:500;font-size:clamp(38px,6vw,62px);line-height:1;margin:8px 0 6px;color:var(--navy)}
.hero .nw small{font-size:.42em;color:var(--muted);font-family:Inter;font-weight:600;letter-spacing:.02em;margin-left:6px}
.delta{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:14px;padding:5px 11px;border-radius:999px}
.delta.up{background:var(--pos-soft);color:var(--pos)} .delta.down{background:var(--neg-soft);color:var(--neg)} .delta.flat{background:#EEF1F5;color:var(--muted)}
.hero .sub{color:var(--muted);font-size:13px;margin-top:12px}
.nwparts{display:flex;gap:18px;flex-wrap:wrap;margin-top:12px;font-size:12.5px;color:var(--muted)}
.nwparts b{color:var(--ink);font-weight:600;margin-left:4px}
.nudge{background:var(--brass-soft);border:1px solid #E7D3A6;border-radius:12px;padding:11px 16px;margin-bottom:16px;font-size:13px;color:#6b531f;cursor:pointer}
.nudge b{color:#4a3914}
.spark{width:100%;height:120px}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border-radius:12px;overflow:hidden;margin-top:6px}
.kpi{background:var(--surface);padding:13px 14px}
.kpi .l{font-size:11px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.kpi .v{font-size:18px;font-weight:600;margin-top:3px}
.pos{color:var(--pos)} .neg{color:var(--neg)}

/* Section heads */
.sec-h{display:flex;align-items:baseline;justify-content:space-between;margin:26px 2px 12px;gap:12px;flex-wrap:wrap}
.sec-h h2{font-family:Fraunces,serif;font-weight:500;font-size:22px;margin:0;color:var(--navy)}
.sec-h .hint{color:var(--muted);font-size:12.5px}

/* Table */
table{width:100%;border-collapse:collapse}
th,td{text-align:right;padding:11px 12px;font-size:13.5px;border-bottom:1px solid var(--line-soft)}
th:first-child,td:first-child{text-align:left}
thead th{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-2);font-weight:600;background:#FAFBFC;position:sticky;top:0}
tbody tr:hover{background:#FAFBFD}
.tag{display:inline-block;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:999px;letter-spacing:.03em;vertical-align:middle}
.tag.usd{background:#EAF2FF;color:#2056A6} .tag.cop{background:#EFF6EE;color:#3C7A3A}
.tag.cat{background:#F2EEF6;color:#6B4E8E}
.bar{height:7px;border-radius:4px;background:var(--line);overflow:hidden;min-width:60px}
.bar i{display:block;height:100%;border-radius:4px}
.muted{color:var(--muted)} .small{font-size:12px} .right{text-align:right} .center{text-align:center}
.rankbar{display:flex;align-items:center;gap:10px;justify-content:flex-end}

/* Forms */
label.fl{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted-2);font-weight:600;margin-bottom:5px}
input,select{font-family:inherit;font-size:14px;border:1px solid var(--line);border-radius:9px;padding:9px 11px;background:#fff;color:var(--ink);width:100%}
input:focus,select:focus{outline:none;border-color:var(--navy-700);box-shadow:0 0 0 3px rgba(19,53,95,.1)}
input.num-in{text-align:right;font-variant-numeric:tabular-nums}
.btn{border:0;border-radius:10px;padding:10px 18px;font-weight:600;font-size:14px}
.btn.primary{background:var(--navy);color:#fff} .btn.primary:hover{background:var(--navy-900)}
.btn.brass{background:var(--brass);color:#1c1303}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--navy)}
.btn.sm{padding:6px 12px;font-size:12.5px;border-radius:8px}
.btn.danger{background:var(--neg-soft);color:var(--neg)}
.toolbar{display:flex;gap:10px;align-items:end;flex-wrap:wrap;padding:16px 18px;border-bottom:1px solid var(--line-soft)}
.toolbar .f{min-width:120px}

/* Entry rows */
.entry-group{padding:6px 0 2px}
.grp-title{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--brass);font-weight:700;padding:14px 18px 6px}
.erow{display:grid;grid-template-columns:1.6fr 1fr 1fr auto;gap:12px;align-items:center;padding:9px 18px;border-bottom:1px solid var(--line-soft)}
.erow .nm{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.erow .prev{font-size:11.5px;color:var(--muted-2)}
.erow .calc{font-size:12.5px;font-weight:600;text-align:right;min-width:90px}
.flow{display:none;grid-column:1/-1;gap:10px;grid-template-columns:1fr 1fr;padding:2px 0 6px}
.erow.open .flow{display:grid}
.linkbtn{background:none;border:0;color:var(--navy-700);font-size:11.5px;font-weight:600;padding:0;text-decoration:underline;text-underline-offset:2px}

.empty{padding:40px 20px;text-align:center;color:var(--muted)}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;
  padding:12px 20px;border-radius:10px;font-size:14px;font-weight:500;opacity:0;transition:.25s;pointer-events:none;z-index:50;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.pill-toggle{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden}
.pill-toggle button{border:0;background:#fff;color:var(--muted);padding:6px 14px;font-size:12.5px;font-weight:600}
.pill-toggle button.on{background:var(--navy);color:#fff}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:10px}
.legend i{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:6px;vertical-align:middle}
.cfg{background:var(--brass-soft);border:1px solid #E7D3A6;border-radius:12px;padding:14px 16px;margin-bottom:18px;font-size:13px;color:#6b531f}
.cfg b{color:#4a3914}
@media(max-width:820px){
  .hero{grid-template-columns:1fr;gap:16px;padding:20px}
  .erow{grid-template-columns:1.4fr 1fr;gap:8px}
  .erow .calc{grid-column:1/-1;text-align:left}
  .flow{grid-template-columns:1fr 1fr}
  th,td{padding:9px 8px;font-size:12.5px}
}
/* Mini-resumen persistente */
#miniSummary:empty{display:none}
.mini{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--navy);color:#fff;
  border-radius:12px;padding:12px 16px;margin-bottom:16px;box-shadow:var(--shadow)}
.mini .l{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#9DB2CC}
.mini .v{font-family:Fraunces,serif;font-size:24px;line-height:1.1;margin-top:2px}
.mini .r{text-align:right}
.mini .d{font-size:13px;font-weight:600;padding:4px 10px;border-radius:999px}
.mini .d.up{background:rgba(111,207,151,.18);color:#9be8bd}
.mini .d.down{background:rgba(178,58,72,.22);color:#f3b4bc}
.mini .d.flat{background:rgba(255,255,255,.12);color:#cdd9e8}
.mini .warn{font-size:11px;color:#E2B33A;margin-top:3px}
/* Móvil: tabs deslizables y toques cómodos */
@media(max-width:640px){
  .wrap{padding:0 12px 90px}
  .tabs{flex-wrap:nowrap;overflow-x:auto;width:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tabs button{white-space:nowrap;padding:10px 15px}
  .topbar .inner{gap:10px}
  .brand .b2{display:none}
  .btn{min-height:42px}
  .btn.sm{min-height:34px}
  .card .toolbar{flex-direction:column;align-items:stretch}
  .toolbar .f{min-width:0}
  .kpis{grid-template-columns:1fr}
  .mini .v{font-size:21px}
  table{display:block;overflow-x:auto;white-space:nowrap}
  input,select{font-size:16px}  /* evita el zoom de iOS al enfocar */
}
.login-wrap{max-width:380px;margin:8vh auto 0;text-align:center}
.login-wrap .mark{font-family:Fraunces,serif;font-size:30px;color:var(--navy);margin:0 0 4px}
.login-wrap .sub{color:var(--muted);font-size:13px;margin-bottom:24px;letter-spacing:.02em}
.login-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:26px 24px;text-align:left}
.login-card label.fl{margin-top:14px}
.login-card .btn{width:100%;margin-top:20px;padding:12px}
.login-err{color:var(--neg);font-size:13px;margin-top:12px;min-height:18px}
</style>
</head>

/* ---------- Utilidades ---------- */
const $=s=>document.querySelector(s);
function fmt(n,ccy){ if(n==null||isNaN(n)) return "—";
  const c=ccy||CCY, dec=c==="USD"?0:0;
  return (c==="USD"?"$":"$")+Number(n).toLocaleString("es-CO",{maximumFractionDigits:dec})+(c==="USD"?"":"");
}
function fmtPct(n){ if(n==null||isNaN(n)||!isFinite(n)) return "—"; return (n>=0?"+":"")+ (n*100).toFixed(1)+"%"; }
function fmtSigned(n){ if(n==null||isNaN(n)) return "—"; return (n>=0?"+":"−")+fmt(Math.abs(n)); }
function rateFor(y,m){ const t=tasas.find(t=>t.anio===y&&t.mes===m); if(t) return t.usd_cop;
  // fallback: última tasa <= (y,m), o cualquier tasa, o 4000
  const sorted=[...tasas].sort((a,b)=> a.anio-b.anio || a.mes-b.mes);
  let r=null; for(const x of sorted){ if(x.anio<y||(x.anio===y&&x.mes<=m)) r=x.usd_cop; }
  return r ?? (sorted.length? sorted[sorted.length-1].usd_cop : 4000);
}
function toCcy(valNative, moneda, y, m, target){
  const t=target||CCY, rate=rateFor(y,m);
  if(moneda===t) return valNative;
  if(moneda==="USD"&&t==="COP") return valNative*rate;
  if(moneda==="COP"&&t==="USD") return valNative/rate;
  return valNative;
}
function regFor(cid,y,m){ return registros.find(r=>r.cuenta_id===cid&&r.anio===y&&r.mes===m); }
function prevPeriod(y,m){ return m===0?{y:y-1,m:11}:{y,m:m-1}; }
// último registro estrictamente anterior a (y,m) para una cuenta
function prevReg(cid,y,m){
  const rs=registros.filter(r=>r.cuenta_id===cid && (r.anio<y||(r.anio===y&&r.mes<m)) && r.saldo!=null)
    .sort((a,b)=> b.anio-a.anio || b.mes-a.mes);
  return rs[0]||null;
}
// P&L y rentabilidad de un mes (en moneda nativa)
function perfMonth(cid,y,m){
  const cur=regFor(cid,y,m); if(!cur||cur.saldo==null) return null;
  const pv=prevReg(cid,y,m);
  const aportes=+cur.aportes||0, retiros=+cur.retiros||0, flujo=aportes-retiros;
  if(!pv) return {saldo:cur.saldo, prev:null, flujo, pnl:null, ret:null};
  const pnl = cur.saldo - pv.saldo - flujo;
  const base = pv.saldo + 0.5*flujo;
  const ret = base>0 ? pnl/base : (flujo>0? pnl/flujo : null);
  return {saldo:cur.saldo, prev:pv.saldo, flujo, pnl, ret};
}
// rentabilidad encadenada (compuesta) sobre los meses con dato, hasta (y,m), del año si ytd
function perfAcum(cid, {ytd=false, upto=null}={}){
  let rs=registros.filter(r=>r.cuenta_id===cid&&r.saldo!=null);
  if(upto) rs=rs.filter(r=> r.anio<upto.y||(r.anio===upto.y&&r.mes<=upto.m));
  if(ytd && upto) rs=rs.filter(r=> r.anio===upto.y);
  rs.sort((a,b)=> a.anio-b.anio || a.mes-b.mes);
  let pnl=0, chain=1, has=false;
  for(const r of rs){ const p=perfMonth(cid,r.anio,r.mes); if(p&&p.pnl!=null){ pnl+=p.pnl; if(p.ret!=null){chain*=(1+p.ret);has=true;} } }
  return {pnl, ret: has? chain-1 : null};
}
// patrimonio (net worth) en (y,m) en moneda CCY: suma saldos vigentes de Inversión - Pasivo
function netWorthParts(y,m){
  let liquido=0, fijos=0, pasivos=0;
  for(const c of cuentas){
    if(c.categoria==="Ingreso") continue;
    const r = regFor(c.id,y,m) || prevReg(c.id,y,m);
    if(!r||r.saldo==null) continue;
    const v=toCcy(r.saldo,c.moneda,y,m,CCY);
    if(c.categoria==="Pasivo") pasivos+=v;
    else if(ILIQUIDOS.includes(c.tipo)) fijos+=v;
    else liquido+=v;
  }
  return {liquido,fijos,pasivos,total:liquido+fijos-pasivos};
}
function netWorthAt(y,m){ return netWorthParts(y,m).total; }
function nwInCcy(y,m,ccy){
  let t=0;
  for(const c of cuentas){
    if(c.categoria==="Ingreso") continue;
    const r=regFor(c.id,y,m)||prevReg(c.id,y,m); if(!r||r.saldo==null) continue;
    const v=toCcy(r.saldo,c.moneda,y,m,ccy);
    t += c.categoria==="Pasivo" ? -v : v;
  }
  return t;
}
// Descompone el cambio de patrimonio entre dos meses: aportes (ahorro) + valorización (mercado) + efecto cambiario
function atribucion(prev,last,ccy){
  let aportes=0,valoriz=0,fx=0;
  cuentas.filter(c=>c.categoria!=="Ingreso").forEach(c=>{
    const rb=regFor(c.id,last.y,last.m); if(!rb||rb.saldo==null) return;
    const ra=regFor(c.id,prev.y,prev.m)||prevReg(c.id,prev.y,prev.m);
    const aNat=ra&&ra.saldo!=null?ra.saldo:0;
    const flows=(+rb.aportes||0)-(+rb.retiros||0);
    const pnl=rb.saldo-aNat-flows;
    const fA=toCcy(1,c.moneda,prev.y,prev.m,ccy), fB=toCcy(1,c.moneda,last.y,last.m,ccy);
    const s=c.categoria==="Pasivo"?-1:1;
    fx+=s*aNat*(fB-fA); aportes+=s*flows*fB; valoriz+=s*pnl*fB;
  });
  return {aportes,valoriz,fx,total:aportes+valoriz+fx};
}
// serie de patrimonio por mes (solo meses con al menos un registro)
function periodsWithData(){
  const set=new Set(); registros.forEach(r=> set.add(r.anio+"-"+r.mes));
  return [...set].map(s=>{const[a,b]=s.split("-");return{y:+a,m:+b}}).sort((x,y)=> x.y-y.y||x.m-y.m);
}

const COINS={BTC:"bitcoin",ETH:"ethereum",SOL:"solana",BNB:"binancecoin",USDT:"tether",USDC:"usd-coin",XRP:"ripple",ADA:"cardano",DOGE:"dogecoin",MATIC:"matic-network",AVAX:"avalanche-2",DOT:"polkadot",LINK:"chainlink",LTC:"litecoin",TRX:"tron",SHIB:"shiba-inu",UNI:"uniswap",ATOM:"cosmos",XLM:"stellar",BCH:"bitcoin-cash"};
function parseHoldings(s){ if(!s) return [];
  return s.split(/[,;\n]+/).map(p=>p.trim()).filter(Boolean).map(p=>{
    let m=p.match(/^([A-Za-z]{2,6})\s*[:= ]\s*([\d.]+)$/); if(!m) m=p.match(/^([\d.]+)\s*([A-Za-z]{2,6})$/);
    if(!m) return null; let sym,qty;
    if(isNaN(m[1])){ sym=m[1].toUpperCase(); qty=parseFloat(m[2]); } else { qty=parseFloat(m[1]); sym=m[2].toUpperCase(); }
    if(!COINS[sym]||isNaN(qty)) return null; return {sym,qty};
  }).filter(Boolean);
}
async function fetchCryptoPrices(syms){
  const ids=[...new Set(syms.map(s=>COINS[s]).filter(Boolean))]; if(!ids.length) return {};
  try{ const r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids="+ids.join(",")+"&vs_currencies=usd");
    const j=await r.json(); const out={}; for(const s of syms){ const id=COINS[s]; if(j[id]) out[s]=j[id].usd; } return out;
  }catch(e){ return {}; }
}
async function cotizarHoldings(notas){
  const h=parseHoldings(notas); if(!h.length) return null;
  const prices=await fetchCryptoPrices(h.map(x=>x.sym));
  let total=0,ok=false; for(const x of h){ if(prices[x.sym]!=null){ total+=x.qty*prices[x.sym]; ok=true; } }
  return ok? Math.round(total*100)/100 : null;
}

async function fetchFXAsOf(dateStr){
  // TRM oficial vigente en una fecha dada (o la más reciente si no se pasa fecha)
  try{
    const q = dateStr
      ? "?$where=vigenciadesde%20%3C=%20'"+dateStr+"T23:59:59'&$order=vigenciadesde%20DESC&$limit=1"
      : "?$order=vigenciadesde%20DESC&$limit=1";
    const r=await fetch("https://www.datos.gov.co/resource/32sa-8pi3.json"+q);
    const j=await r.json(); const v=j&&j[0]&&parseFloat(j[0].valor); if(v) return Math.round(v);
  }catch(e){}
  try{ const r=await fetch("https://open.er-api.com/v6/latest/USD"); const j=await r.json();
    const cop=j&&j.rates&&j.rates.COP; if(cop) return Math.round(cop);
  }catch(e){}
  return null;
}

let rankMode="hist"; // hist | ytd | mes
function viewResumen(){
  const pers=periodsWithData();
  const last = pers.length? pers[pers.length-1] : {y:selY,m:selM};
  const prev = pers.length>1? pers[pers.length-2] : prevPeriod(last.y,last.m);
  const nw = netWorthAt(last.y,last.m);
  const nwPrev = netWorthAt(prev.y,prev.m);
  const dNw = nw-nwPrev, dPct = nwPrev>0? dNw/nwPrev : null;
  const dcls = dNw>0?"up":(dNw<0?"down":"flat");
  const arrow = dNw>0?"▲":(dNw<0?"▼":"–");

  // serie patrimonio
  const serie = pers.map(p=>({...p,v:netWorthAt(p.y,p.m)}));
  // rentabilidad del mes (suma P&L cuentas inversión, en CCY, del último periodo)
  let pnlMes=0, aportesMes=0;
  cuentas.filter(c=>c.categoria==="Inversión").forEach(c=>{
    const p=perfMonth(c.id,last.y,last.m);
    if(p&&p.pnl!=null) pnlMes+=toCcy(p.pnl,c.moneda,last.y,last.m,CCY);
    if(p) aportesMes+=toCcy(p.flujo||0,c.moneda,last.y,last.m,CCY);
  });
  const nActivas=cuentas.filter(c=>c.activa!==false&&c.categoria==="Inversión").length;
  const P=netWorthParts(last.y,last.m);
  const hayPatrimonioTotal = P.fijos>0 || P.pasivos>0;
  const eyebrow = hayPatrimonioTotal ? "Patrimonio total" : "Patrimonio financiero";
  const breakdown = hayPatrimonioTotal ? `<div class="nwparts">
      <span>Líquido <b class="num">${fmt(P.liquido)}</b></span>
      ${P.fijos>0?`<span>Activos fijos <b class="num">${fmt(P.fijos)}</b></span>`:""}
      ${P.pasivos>0?`<span>Pasivos <b class="num neg">−${fmt(P.pasivos)}</b></span>`:""}
    </div>` : "";

  // Valorización acumulada (cuánto se ha incrementado desde que mides) — distinta del valor
  let valorizAcum=0, valorInv=0;
  cuentas.filter(c=>c.categoria==="Inversión").forEach(c=>{
    const ac=perfAcum(c.id,{upto:last}); if(ac.pnl) valorizAcum+=toCcy(ac.pnl,c.moneda,last.y,last.m,CCY);
    const r=regFor(c.id,last.y,last.m)||prevReg(c.id,last.y,last.m); if(r&&r.saldo!=null) valorInv+=toCcy(r.saldo,c.moneda,last.y,last.m,CCY);
  });
  const valorizPct = (valorInv-valorizAcum)>0 ? valorizAcum/(valorInv-valorizAcum) : null;
  // Ingresos del mes (flujo de caja, NO patrimonio)
  let ingresoMes=0;
  cuentas.filter(c=>c.categoria==="Ingreso").forEach(c=>{ const r=regFor(c.id,last.y,last.m); if(r&&r.saldo) ingresoMes+=toCcy(r.saldo,c.moneda,last.y,last.m,CCY); });

  // Recordatorio de cierre mensual
  const cal=new Date(), curY=cal.getFullYear(), curM=cal.getMonth();
  const cierreHecho = registros.some(r=> r.anio===curY&&r.mes===curM&&r.saldo!=null && cuentas.find(c=>c.id===r.cuenta_id&&c.categoria==="Inversión"));
  const nudge = !cierreHecho ? `<div class="nudge" id="nudgeCierre">Cierre de <b>${MESES_L[curM]} ${curY}</b> pendiente — actualiza los saldos de tus inversiones · <span class="linkbtn">Registrar ahora →</span></div>` : "";

  let html=`${nudge}<div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button class="btn ghost sm" id="btnPDF">Descargar reporte PDF</button></div><div class="card hero">
    <div>
      <div class="eyebrow">${eyebrow} · ${MESES_L[last.m]} ${last.y}</div>
      <div class="nw num">${fmt(nw)} <small>${CCY}</small></div>
      <span class="delta ${dcls}">${arrow} ${fmtSigned(dNw)} ${dPct!=null?"· "+fmtPct(dPct):""}</span>
      ${breakdown}
      <div class="sub">Lo que vale hoy tu patrimonio. ${hayPatrimonioTotal?"Activos (líquidos + fijos) menos pasivos":"Suma de saldos de inversión, neto de pasivos"}, en ${CCY}. Los ingresos recurrentes no se suman aquí: son flujo, no patrimonio.</div>
    </div>
    <div>
      ${sparkSVG(serie)}
      <div class="kpis">
        <div class="kpi"><div class="l">Valorización del mes</div><div class="v ${pnlMes>=0?'pos':'neg'} num">${fmtSigned(pnlMes)}</div></div>
        <div class="kpi"><div class="l">Valorización acumulada</div><div class="v ${valorizAcum>=0?'pos':'neg'} num">${fmtSigned(valorizAcum)}</div><div class="l" style="text-transform:none;margin-top:2px">${valorizPct!=null?fmtPct(valorizPct):""}</div></div>
        <div class="kpi"><div class="l">Ingresos del mes</div><div class="v num">${ingresoMes?fmt(ingresoMes):"—"}</div><div class="l" style="text-transform:none;margin-top:2px">flujo, aparte</div></div>
      </div>
    </div>
  </div>`;

  // Distribución por tipo y por titular
  html+=`<div class="grid" style="grid-template-columns:1fr 1fr">
    ${allocCard("Por tipo de cuenta", allocBy("tipo",last))}
    ${allocCard("Por titular", allocBy("titular",last))}
  </div>`;

  // Ranking de cuentas (qué negocio rinde)
  html+=`<div class="sec-h"><h2>Ranking de inversiones</h2>
    <div class="pill-toggle" id="rankToggle">
      <button data-r="hist" class="${rankMode==='hist'?'on':''}">Histórico</button>
      <button data-r="ytd" class="${rankMode==='ytd'?'on':''}">Año ${last.y}</button>
      <button data-r="mes" class="${rankMode==='mes'?'on':''}">Mes</button>
    </div></div>`;
  html+= rankTable(last);

  $("#view").innerHTML=html;
  document.querySelectorAll("#rankToggle button").forEach(b=> b.onclick=()=>{rankMode=b.dataset.r;viewResumen();});
  if($("#nudgeCierre")) $("#nudgeCierre").onclick=()=>{ TAB="registrar"; document.querySelectorAll("#tabs button").forEach(x=>x.classList.toggle("on",x.dataset.t==="registrar")); render(); };
  if($("#btnPDF")) $("#btnPDF").onclick=()=>exportReport(last);
}

function allocBy(field,last){
  const map={};
  cuentas.filter(c=>c.categoria==="Inversión").forEach(c=>{
    const r=regFor(c.id,last.y,last.m)||prevReg(c.id,last.y,last.m); if(!r||r.saldo==null) return;
    const v=toCcy(r.saldo,c.moneda,last.y,last.m,CCY); const k=c[field]||"—";
    map[k]=(map[k]||0)+v;
  });
  const arr=Object.entries(map).map(([k,v])=>({k,v})).sort((a,b)=>b.v-a.v);
  const tot=arr.reduce((s,x)=>s+x.v,0)||1;
  return arr.map(x=>({...x,pct:x.v/tot}));
}
function allocCard(title,rows){
  const colors=["#0B2545","#13355F","#B0863A","#1E7A5A","#5B6B7F","#8A98A8","#2056A6","#6B4E8E"];
  let body=rows.length? rows.map((r,i)=>`<tr>
     <td><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${colors[i%colors.length]};margin-right:8px"></span>${r.k}</td>
     <td class="num">${fmt(r.v)}</td>
     <td style="width:120px"><div class="rankbar"><span class="small muted">${(r.pct*100).toFixed(0)}%</span><div class="bar" style="flex:1"><i style="width:${(r.pct*100).toFixed(1)}%;background:${colors[i%colors.length]}"></i></div></div></td>
   </tr>`).join("") : `<tr><td colspan="3" class="empty">Sin datos aún</td></tr>`;
  return `<div class="card"><div class="grp-title" style="color:var(--navy)">${title}</div>
    <table><tbody>${body}</tbody></table></div>`;
}

function rankTable(last){
  const rows=cuentas.filter(c=>c.categoria==="Inversión"&&c.activa!==false).map(c=>{
    let pnl,ret;
    if(rankMode==="mes"){ const p=perfMonth(c.id,last.y,last.m); pnl=p?p.pnl:null; ret=p?p.ret:null; }
    else { const p=perfAcum(c.id,{ytd:rankMode==="ytd",upto:last}); pnl=p.pnl; ret=p.ret; }
    const saldoR=regFor(c.id,last.y,last.m)||prevReg(c.id,last.y,last.m);
    const saldo=saldoR? toCcy(saldoR.saldo,c.moneda,last.y,last.m,CCY):null;
    return {c,pnl: pnl!=null?toCcy(pnl,c.moneda,last.y,last.m,CCY):null, ret, saldo};
  }).filter(x=>x.pnl!=null||x.saldo!=null);
  rows.sort((a,b)=> (b.ret??-9)-(a.ret??-9));
  const maxAbs=Math.max(1,...rows.map(r=>Math.abs(r.ret||0)));
  let body=rows.length? rows.map(r=>{
    const pos=(r.ret||0)>=0; const w=Math.abs(r.ret||0)/maxAbs*100;
    return `<tr>
      <td><span class="nm" style="font-weight:600">${r.c.nombre}</span> <span class="tag ${r.c.moneda==='USD'?'usd':'cop'}">${r.c.moneda}</span></td>
      <td class="num muted">${r.saldo!=null?fmt(r.saldo):"—"}</td>
      <td class="num ${(r.pnl||0)>=0?'pos':'neg'}">${r.pnl!=null?fmtSigned(r.pnl):"—"}</td>
      <td class="num ${pos?'pos':'neg'}" style="font-weight:600">${fmtPct(r.ret)}</td>
      <td style="width:140px"><div class="bar"><i style="width:${w.toFixed(0)}%;background:${pos?'var(--pos)':'var(--neg)'};margin-left:${pos?'0':'auto'}"></i></div></td>
    </tr>`;
  }).join("") : `<tr><td colspan="5" class="empty">Registra al menos dos meses para ver rentabilidades.</td></tr>`;
  return `<div class="card"><table>
    <thead><tr><th>Cuenta</th><th>Saldo</th><th>P&L ${rankMode==='hist'?'histórico':(rankMode==='ytd'?'año':'mes')}</th><th>Rentab.</th><th></th></tr></thead>
    <tbody>${body}</tbody></table>
    <div class="legend" style="padding:0 14px 14px"><span>Rentabilidad real = variación del saldo menos aportes más retiros. El % es compuesto (encadenado) sobre los meses con dato.</span></div>
    </div>`;
}

function sparkSVG(serie){
  if(serie.length<2) return `<div class="spark center muted small" style="display:flex;align-items:center;justify-content:center">Registra varios meses para ver la curva del patrimonio</div>`;
  const W=440,H=120,p=8;
  const vs=serie.map(s=>s.v), min=Math.min(...vs), max=Math.max(...vs), rng=(max-min)||1;
  const X=i=> p + i*(W-2*p)/(serie.length-1);
  const Y=v=> H-p - (v-min)/rng*(H-2*p);
  let d="", area="";
  serie.forEach((s,i)=>{ d+=(i?"L":"M")+X(i).toFixed(1)+" "+Y(s.v).toFixed(1)+" "; });
  area=`M${X(0)} ${H-p} `+serie.map((s,i)=>"L"+X(i).toFixed(1)+" "+Y(s.v).toFixed(1)).join(" ")+` L${X(serie.length-1)} ${H-p} Z`;
  const lastUp = serie[serie.length-1].v>=serie[0].v;
  const col=lastUp?"var(--pos)":"var(--neg)";
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="g" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="${col}" stop-opacity=".18"/><stop offset="1" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#g)"/>
    <path d="${d}" fill="none" stroke="${col}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${X(serie.length-1)}" cy="${Y(serie[serie.length-1].v)}" r="3.5" fill="${col}"/>
  </svg>`;
}

function svgLineM(serie){

  const area=`M${X(0)} ${H-pb} `+serie.map((s,i)=>'L'+X(i).toFixed(1)+' '+Y(s.v).toFixed(1)).join(' ')+` L${X(serie.length-1)} ${H-pb} Z`;

function svgBarsM(serie){
  if(!serie.length) return '<div class="empty">Sin datos.</div>';
  const W=720,H=220,pl=8,pr=8,pt=22,pb=26,n=serie.length;
  const vs=serie.map(s=>s.v),max=Math.max(...vs,0),min=Math.min(...vs,0),rng=(max-min)||1;
  const Y=v=>H-pb-(v-min)/rng*(H-pt-pb),bw=(W-pl-pr)/n*0.55;
  const bars=serie.map((s,i)=>{const cx=pl+(i+0.5)*(W-pl-pr)/n,y0=Y(0),y1=Y(s.v),top=Math.min(y0,y1),h=Math.abs(y1-y0)||1;
    return `<rect x="${(cx-bw/2).toFixed(1)}" y="${top.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="4" fill="${s.v>=0?'#2056A6':'#B23A48'}"/>
      <text x="${cx.toFixed(1)}" y="${(H-8)}" font-size="11" fill="#8A98A8" text-anchor="middle">${s.label}</text>
      <text x="${cx.toFixed(1)}" y="${(top-5).toFixed(1)}" font-size="10" fill="#5B6B7F" text-anchor="middle">${(s.v>=0?'+':'−')+Math.abs(Math.round(s.v/1e6)).toLocaleString("es-CO")}M</text>`;}).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto"><line x1="${pl}" y1="${Y(0).toFixed(1)}" x2="${W-pr}" y2="${Y(0).toFixed(1)}" stroke="#EAF0F6"/>${bars}</svg>`;
}

// Gráfico de líneas con ejes/etiquetas para una serie [{label, v}]
function bigLineSVG(serie, color){

  const X=i=> pl + i*(W-pl-pr)/(serie.length-1);
  const Y=v=> H-pb - (v-min)/rng*(H-pt-pb);
  const col=color||"var(--navy-700)";
  let d=serie.map((s,i)=>(i?"L":"M")+X(i).toFixed(1)+" "+Y(s.v).toFixed(1)).join(" ");

  const dots=serie.map((s,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(s.v).toFixed(1)}" r="2.6" fill="${col}"/>`).join("");
  // etiquetas X: primera, media, última

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto" preserveAspectRatio="xMidYMid meet">
    <defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="${col}" stop-opacity=".14"/><stop offset="1" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
    <line x1="${pl}" y1="${H-pb}" x2="${W-pr}" y2="${H-pb}" stroke="#EAF0F6"/>
    <path d="${area}" fill="url(#bg)"/>

}
function viewRegistrar(){

  const rate=rateFor(selY,selM);
  let html=`<div class="card">
    <div class="toolbar">
      <div class="f"><label class="fl">Año</label><select id="rgY">${yrs.map(y=>`<option ${y===selY?'selected':''}>${y}</option>`).join("")}</select></div>
      <div class="f"><label class="fl">Mes</label><select id="rgM">${MESES_L.map((m,i)=>`<option value="${i}" ${i===selM?'selected':''}>${m}</option>`).join("")}</select></div>
      <div class="f"><label class="fl">Tasa USD/COP del mes</label>
        <div style="display:flex;gap:6px"><input id="rgRate" class="num-in" value="${rate}" style="flex:1">
        <button class="btn ghost sm" id="rgFx" title="Traer tasa de hoy">Hoy</button></div></div>
      <div style="flex:1"></div>
      <button class="btn primary" id="rgSave">Guardar mes</button>
    </div>`;

  const invs=cuentas.filter(c=>c.categoria==="Inversión"&&c.activa!==false);
  const grupos={};
  invs.forEach(c=>{ (grupos[c.tipo]=grupos[c.tipo]||[]).push(c); });

    html+=`<div class="grp-title">${tipo}</div>`;
    grupos[tipo].forEach(c=>{
      const r=regFor(c.id,selY,selM)||{}; const pv=prevReg(c.id,selY,selM);
      const open=(r.aportes||r.retiros)?"open":"";
      const tieneHold=parseHoldings(c.notas).length>0;
      html+=`<div class="erow ${open}" data-id="${c.id}">
        <div class="nm">${c.nombre} <span class="tag ${c.moneda==='USD'?'usd':'cop'}">${c.moneda}</span>
          <span class="prev">${pv?("anterior: "+pv.saldo.toLocaleString("es-CO")):"primer registro"}</span></div>
        <div><input class="num-in s" data-id="${c.id}" placeholder="saldo ${c.moneda}" value="${r.saldo??""}">
          ${tieneHold?`<button class="linkbtn cot" data-id="${c.id}" style="margin-top:4px">⟳ cotizar (${c.notas})</button>`:""}</div>
        <div class="calc" data-calc="${c.id}"></div>
        <div style="text-align:right"><button class="linkbtn tg">+ aporte/retiro</button></div>
        <div class="flow">
          <div><label class="fl">Aporte (metiste)</label><input class="num-in a" data-id="${c.id}" value="${r.aportes??""}"></div>
          <div><label class="fl">Retiro (sacaste)</label><input class="num-in w" data-id="${c.id}" value="${r.retiros??""}"></div>
        </div>
      </div>`;
    });
  }
  html+=`</div><p class="muted small" style="margin:14px 2px">Solo necesitas escribir el <b>saldo</b> de cada cuenta. Abre “+ aporte/retiro” únicamente en los meses que metiste o sacaste plata: ahí el sistema separa la ganancia real del movimiento de capital.</p>`;
  $("#view").innerHTML=html;

  $("#rgY").onchange=e=>{selY=+e.target.value;viewRegistrar();};
  $("#rgM").onchange=e=>{selM=+e.target.value;viewRegistrar();};
  $("#rgFx").onclick=async()=>{
    $("#rgFx").textContent="…";
    const cal=new Date(); let dateStr=null;
    if(selY<cal.getFullYear() || (selY===cal.getFullYear() && selM<cal.getMonth())){
      const ld=new Date(selY,selM+1,0);
      dateStr=`${selY}-${String(selM+1).padStart(2,'0')}-${String(ld.getDate()).padStart(2,'0')}`;
    }
    const v=await fetchFXAsOf(dateStr);
    if(v){ $("#rgRate").value=v; toast("TRM "+(dateStr?("cierre "+MESES[selM]):"hoy")+": "+v.toLocaleString("es-CO")); }
    else toast("No pude traer la tasa; escríbela a mano");
    $("#rgFx").textContent="Hoy";
  };
  document.querySelectorAll(".erow .tg").forEach(b=> b.onclick=e=> e.target.closest(".erow").classList.toggle("open"));
  const recalc=()=>{
    document.querySelectorAll(".erow").forEach(row=>{
      const id=row.dataset.id, c=cuentas.find(x=>x.id===id);
      const s=parseFloat(row.querySelector(".s").value), a=parseFloat(row.querySelector(".a").value)||0, w=parseFloat(row.querySelector(".w").value)||0;
      const pv=prevReg(id,selY,selM); const el=row.querySelector("[data-calc]");
      if(isNaN(s)){el.textContent="";return;}
      if(!pv){el.innerHTML=`<span class="muted small">base inicial</span>`;return;}
      const flujo=a-w, pnl=s-pv.saldo-flujo, base=pv.saldo+0.5*flujo, ret=base>0?pnl/base:null;
      el.innerHTML=`<span class="${pnl>=0?'pos':'neg'}">${fmtSigned(pnl)} ${ret!=null?"· "+fmtPct(ret):""}</span>`;
    });
  };
  document.querySelectorAll(".erow input").forEach(i=> i.addEventListener("input",recalc));
  document.querySelectorAll(".erow .cot").forEach(b=> b.onclick=async()=>{
    const c=cuentas.find(x=>x.id===b.dataset.id); const old=b.textContent; b.textContent="cotizando…";
    const v=await cotizarHoldings(c.notas);
    if(v!=null){ const inp=document.querySelector(`.s[data-id="${c.id}"]`); inp.value=v; recalc(); toast(c.nombre+": "+v.toLocaleString("es-CO")+" USD"); }
    else toast("No pude cotizar; revisa el formato (ej: BTC 1.5, ETH 10)");
    b.textContent=old;
  });
  recalc();

  $("#rgSave").onclick=async()=>{
    // Recolectar lo que se va a guardar
    const items=[];
    for(const row of document.querySelectorAll(".erow")){
      const id=row.dataset.id;
      const s=parseFloat(row.querySelector(".s").value);
      const a=parseFloat(row.querySelector(".a").value)||0, w=parseFloat(row.querySelector(".w").value)||0;
      if(isNaN(s)) continue;
      items.push({id,s,a,w});
    }
    // Guardrail: avisar cambios bruscos (>40%) vs mes anterior, descontando flujos
    const alertas=[];
    for(const it of items){
      const pv=prevReg(it.id,selY,selM); if(!pv||pv.saldo<=0) continue;
      const esperado=pv.saldo+(it.a-it.w);
      const cambio=Math.abs(it.s-esperado)/Math.abs(pv.saldo);
      if(cambio>0.40){ const c=cuentas.find(x=>x.id===it.id);
        alertas.push(`• ${c.nombre}: ${pv.saldo.toLocaleString("es-CO")} → ${it.s.toLocaleString("es-CO")}`); }
    }
    if(alertas.length){
      if(!confirm("Estos saldos cambiaron más de 40% frente al mes anterior. ¿Seguro que están bien?\n\n"+alertas.join("\n")+"\n\n(Si moviste plata, ábrele “+ aporte/retiro” para que no lo cuente como ganancia.)")) return;
    }
    const rate=parseFloat($("#rgRate").value); if(rate) await db.upsertTasa(selY,selM,rate);
    // Guardar + armar bitácora
    const bit=[];
    for(const it of items){
      const ex=regFor(it.id,selY,selM); const prevVal=ex?ex.saldo:null;
      await db.upsertReg({cuenta_id:it.id,anio:selY,mes:selM,saldo:it.s,aportes:it.a,retiros:it.w});
      if(prevVal!==it.s){ const c=cuentas.find(x=>x.id===it.id);
        bit.push({cuenta_id:it.id,cuenta_nombre:c?c.nombre:"",anio:selY,mes:selM,saldo_anterior:prevVal,saldo_nuevo:it.s,accion:prevVal==null?"crear":"editar"}); }
    }
    await db.logBitacora(bit);
    await db.saveSnapshot();
    await db.load(); toast(`Guardado · ${items.length} cuentas · ${MESES_L[selM]} ${selY}`); recalc();
  };
}

  if(c){
    // Curva de valor en el tiempo (moneda nativa)
    const asc=registros.filter(r=>r.cuenta_id===c.id&&r.saldo!=null).sort((a,b)=> a.anio-b.anio||a.mes-b.mes);
    if(asc.length>=2){
      const serie=asc.map(r=>({label:MESES[r.mes]+" "+String(r.anio).slice(2), v:r.saldo}));
      html+=`<div class="card" style="margin-top:16px"><div class="grp-title" style="color:var(--navy)">Valor de ${c.nombre} en el tiempo (${c.moneda})</div>
        <div style="padding:8px 14px 14px">${bigLineSVG(serie,"var(--navy-700)")}</div></div>`;
    }
    const rs=registros.filter(r=>r.cuenta_id===c.id&&r.saldo!=null).sort((a,b)=> b.anio-a.anio||b.mes-a.mes);
    html+=`<div class="card" style="margin-top:16px"><table>
      <thead><tr><th>Periodo</th><th>Saldo (${c.moneda})</th><th>Aporte</th><th>Retiro</th><th>Variación</th><th>Ganancia real</th><th>Rentab.</th></tr></thead><tbody>`;
    if(!rs.length) html+=`<tr><td colspan="7" class="empty">Sin registros para esta cuenta.</td></tr>`;
    rs.forEach(r=>{ const p=perfMonth(c.id,r.anio,r.mes); const v=p&&p.prev!=null? p.saldo-p.prev:null;
      html+=`<tr>
        <td>${MESES[r.mes]} ${r.anio}</td>
        <td class="num">${r.saldo.toLocaleString("es-CO")}</td>
        <td class="num muted">${r.aportes?r.aportes.toLocaleString("es-CO"):"—"}</td>
        <td class="num muted">${r.retiros?r.retiros.toLocaleString("es-CO"):"—"}</td>
        <td class="num">${v!=null?(v>=0?"+":"−")+Math.abs(v).toLocaleString("es-CO"):"—"}</td>
        <td class="num ${p&&p.pnl>=0?'pos':'neg'}">${p&&p.pnl!=null?(p.pnl>=0?"+":"−")+Math.abs(p.pnl).toLocaleString("es-CO"):"—"}</td>
        <td class="num ${p&&p.ret>=0?'pos':'neg'}" style="font-weight:600">${p?fmtPct(p.ret):"—"}</td>
      </tr>`;
    });
    const ac=perfAcum(c.id,{});
    html+=`</tbody><tfoot><tr style="background:#FAFBFC"><td style="font-weight:700">Acumulado</td><td colspan="4"></td>
      <td class="num ${ac.pnl>=0?'pos':'neg'}" style="font-weight:700">${(ac.pnl>=0?"+":"−")+Math.abs(ac.pnl).toLocaleString("es-CO")}</td>
      <td class="num ${ac.ret>=0?'pos':'neg'}" style="font-weight:700">${fmtPct(ac.ret)}</td></tr></tfoot></table>
      <div class="legend" style="padding:12px 14px"><span><b>Variación</b>: cambio del saldo. <b>Ganancia real</b>: variación menos aportes más retiros (lo que de verdad rindió). <b>Rentab.</b>: ganancia sobre el capital base del mes.</span></div></div>`;
  }
  $("#view").innerHTML=html;
  if($("#hSel")) $("#hSel").onchange=e=>{histId=e.target.value;viewHistorico();};
}

/* ===== LEGADO (historia previa, P&L en COP, solo lectura) ===== */
let legY=null;
function viewLegado(){
  const years=Object.keys(LEGADO).map(Number).sort((a,b)=>a-b);
  if(legY===null){ // por defecto: año con más datos
    let best=years[0],bestN=-1;
    years.forEach(y=>{let n=0;Object.values(LEGADO[y]).forEach(arr=>arr.forEach(v=>{if(v!=null)n++;}));if(n>bestN){bestN=n;best=y;}});
    legY=best;
  }
  const yd=LEGADO[legY]||{};
  const accs=Object.keys(yd);
  let totM=Array(12).fill(0), grand=0;

  let body=accs.map(a=>{
    const arr=yd[a]; let tot=0;
    const tds=arr.map((v,m)=>{ if(v==null) return '<td class="muted">—</td>';
      tot+=v; totM[m]+=v;
      return `<td class="num ${v>=0?'pos':'neg'}">${(v>=0?'+':'−')+Math.abs(v).toLocaleString('es-CO')}</td>`;
    }).join('');
    grand+=tot;
    return `<tr><td style="font-weight:600">${a}</td>${tds}<td class="num" style="font-weight:600">${(tot>=0?'+':'−')+Math.abs(tot).toLocaleString('es-CO')}</td></tr>`;
  }).join('');

  let footer=`<tr style="background:#FAFBFC"><td style="font-weight:700">Total mensual</td>${totM.map(v=>`<td class="num ${v>=0?'pos':'neg'}" style="font-weight:600">${v?((v>=0?'+':'−')+Math.abs(v).toLocaleString('es-CO')):'—'}</td>`).join('')}<td class="num" style="font-weight:700">${(grand>=0?'+':'−')+Math.abs(grand).toLocaleString('es-CO')}</td></tr>`;

  // Ranking P&L de por vida (suma todos los años, por nombre de cuenta)
  // Se excluyen los flujos de ingreso para que el ranking mida solo inversiones.
  const INGRESOS_LEG=["Sierraluna","FND","Salario Sierraluna","Contrato FND","Alquiler Giardino"];
  const life={};
  years.forEach(y=>Object.entries(LEGADO[y]).forEach(([a,arr])=>{ if(INGRESOS_LEG.includes(a)) return; arr.forEach(v=>{if(v!=null)life[a]=(life[a]||0)+v;});}));
  const lifeArr=Object.entries(life).map(([a,v])=>({a,v})).sort((x,y)=>y.v-x.v);
  const maxAbs=Math.max(1,...lifeArr.map(r=>Math.abs(r.v)));
  const lifeBody=lifeArr.map(r=>{const pos=r.v>=0;const w=Math.abs(r.v)/maxAbs*100;
    return `<tr><td style="font-weight:600">${r.a}</td>
      <td class="num ${pos?'pos':'neg'}" style="font-weight:600">${(pos?'+':'−')+Math.abs(r.v).toLocaleString('es-CO')}</td>
      <td style="width:160px"><div class="bar"><i style="width:${w.toFixed(0)}%;background:${pos?'var(--pos)':'var(--neg)'};margin-left:${pos?'0':'auto'}"></i></div></td></tr>`;
  }).join('');

  let html=`<div class="cfg" style="background:#EEF3F8;border-color:#CBDBEC;color:#234">
    <b>Histórico previo</b> — tus registros de variaci&oacute;n mensual (ganancia/p&eacute;rdida) tal como los llevabas, en COP. Es un archivo de solo lectura: el seguimiento nuevo por saldos vive en las dem&aacute;s pesta&ntilde;as. A&ntilde;os inferidos del orden de tu Excel; si alguno va corrido, av&iacute;same.</div>`;

  // Gráficos de desempeño histórico (datos reales 2023-2026)
  const ING_LEG=["Sierraluna","FND","Salario Sierraluna","Contrato FND","Alquiler Giardino"];
  let cum=0, lineSerie=[];
  years.forEach(yy=>{ for(let mm=0;mm<12;mm++){ let mp=0,any=false;
    Object.entries(LEGADO[yy]).forEach(([a,arr])=>{ if(ING_LEG.includes(a))return; if(arr[mm]!=null){mp+=arr[mm];any=true;} });
    if(any){ cum+=mp; lineSerie.push({label:MESES[mm]+" "+String(yy).slice(2), v:cum}); } } });
  const annual=years.map(yy=>{ let s=0; Object.entries(LEGADO[yy]).forEach(([a,arr])=>{ if(ING_LEG.includes(a))return; arr.forEach(v=>{if(v!=null)s+=v;}); }); return {label:String(yy),v:s}; });
  html+=`<div class="sec-h"><h2>Ganancia acumulada en el tiempo</h2><span class="hint">todas tus inversiones · COP</span></div>
    <div class="card"><div style="padding:10px 14px">${svgLineM(lineSerie)}</div>
    <div class="legend" style="padding:0 14px 12px"><span>Suma encadenada de tu ganancia mensual desde ${years[0]}. Acumulado total: <b>${Math.round(cum/1e6).toLocaleString("es-CO")}M COP</b>.</span></div></div>
    <div class="sec-h"><h2>Ganancia por año</h2><span class="hint">COP</span></div>
    <div class="card"><div style="padding:14px">${svgBarsM(annual)}</div></div>`;

  html+=`<div class="sec-h"><h2>Detalle por año</h2></div>
  <div class="card"><div class="toolbar" style="border-bottom:0">
    <div class="f"><label class="fl">A&ntilde;o</label><select id="lgY">${years.map(y=>`<option ${y===legY?'selected':''}>${y}</option>`).join('')}</select></div>
    <div style="flex:1"></div>
    <div class="kpi" style="background:transparent;padding:0;text-align:right"><div class="l">P&L total ${legY}</div><div class="v num ${grand>=0?'pos':'neg'}">${(grand>=0?'+':'−')+Math.abs(grand).toLocaleString('es-CO')}</div></div>
  </div>
  <div style="overflow-x:auto"><table style="min-width:920px">
    <thead><tr><th>Fuente</th>${MESES.map(m=>`<th>${m}</th>`).join('')}<th>Total a&ntilde;o</th></tr></thead>
    <tbody>${body}</tbody><tfoot>${footer}</tfoot></table></div></div>

  <div class="sec-h"><h2>Ganancia hist&oacute;rica por cuenta</h2><span class="hint">solo inversiones · suma de todos los a&ntilde;os · COP</span></div>
  <div class="card"><table><thead><tr><th>Cuenta</th><th>P&L de por vida</th><th></th></tr></thead><tbody>${lifeBody}</tbody></table></div>`;

  document.getElementById('view').innerHTML=html;
  document.getElementById('lgY').onchange=e=>{legY=+e.target.value;viewLegado();};
}

/* ===== ANÁLISIS (concentración + benchmark) ===== */
function viewAnalisis(){
  const pers=periodsWithData();
  const last = pers.length? pers[pers.length-1] : {y:selY,m:selM};

  // --- Concentración por clase de activo ---
  const map={};
  cuentas.filter(c=>c.categoria==="Inversión").forEach(c=>{
    const r=regFor(c.id,last.y,last.m)||prevReg(c.id,last.y,last.m); if(!r||r.saldo==null) return;
    const v=toCcy(r.saldo,c.moneda,last.y,last.m,CCY); const k=claseActivo(c);
    map[k]=(map[k]||0)+v;
  });
  const arr=Object.entries(map).map(([k,v])=>({k,v})).sort((a,b)=>b.v-a.v);
  const tot=arr.reduce((s,x)=>s+x.v,0)||1;
  const colors={"Cripto":"#B0863A","Acciones / Brokers":"#0B2545","Efectivo y ahorro":"#1E7A5A","Activos fijos":"#13355F","Otro":"#8A98A8"};

  // cuenta individual más grande
  let topCuenta=null;
  cuentas.filter(c=>c.categoria==="Inversión").forEach(c=>{
    const r=regFor(c.id,last.y,last.m)||prevReg(c.id,last.y,last.m); if(!r||r.saldo==null) return;
    const v=toCcy(r.saldo,c.moneda,last.y,last.m,CCY); if(!topCuenta||v>topCuenta.v) topCuenta={n:c.nombre,v};
  });
  const alertas=[];
  const cripto=arr.find(x=>x.k==="Cripto"); if(cripto && cripto.v/tot>0.25) alertas.push(`Cripto pesa ${(cripto.v/tot*100).toFixed(0)}% del portafolio — alta volatilidad concentrada.`);
  if(arr[0] && arr[0].v/tot>0.55) alertas.push(`"${arr[0].k}" concentra ${(arr[0].v/tot*100).toFixed(0)}% de todo.`);
  if(topCuenta && topCuenta.v/tot>0.30) alertas.push(`Una sola cuenta (${topCuenta.n}) es ${(topCuenta.v/tot*100).toFixed(0)}% del total — riesgo de cuenta única.`);

  let concRows=arr.map(x=>`<tr>
     <td><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${colors[x.k]||'#8A98A8'};margin-right:8px"></span>${x.k}</td>
     <td class="num">${fmt(x.v)}</td>
     <td style="width:200px"><div class="rankbar"><span class="small muted">${(x.v/tot*100).toFixed(0)}%</span><div class="bar" style="flex:1"><i style="width:${(x.v/tot*100).toFixed(1)}%;background:${colors[x.k]||'#8A98A8'}"></i></div></div></td>
   </tr>`).join("");

  let html=`<div class="sec-h"><h2>Composición y concentración</h2><span class="hint">${MESES_L[last.m]} ${last.y} · ${CCY}</span></div>`;
  if(alertas.length) html+=`<div class="cfg" style="background:var(--neg-soft);border-color:#E9C2C7;color:#7d2630">⚠ ${alertas.join("<br>⚠ ")}</div>`;
  html+=`<div class="card"><table><tbody>${concRows||'<tr><td class="empty">Sin datos</td></tr>'}</tbody></table></div>`;

  // --- Patrimonio por titular ---
  const tm={};
  cuentas.filter(c=>c.categoria==="Inversión").forEach(c=>{
    const r=regFor(c.id,last.y,last.m)||prevReg(c.id,last.y,last.m); if(!r||r.saldo==null) return;
    const k=c.titular||"—"; tm[k]=(tm[k]||0)+toCcy(r.saldo,c.moneda,last.y,last.m,CCY);
  });
  const ta=Object.entries(tm).map(([k,v])=>({k,v})).sort((a,b)=>b.v-a.v);
  const tt=ta.reduce((s,x)=>s+x.v,0)||1;
  if(ta.length){
    html+=`<div class="sec-h"><h2>Patrimonio por titular</h2><span class="hint">${CCY}</span></div><div class="card"><table><tbody>`+
      ta.map(x=>`<tr><td style="font-weight:600">${x.k}</td><td class="num">${fmt(x.v)}</td>
        <td style="width:200px"><div class="rankbar"><span class="small muted">${(x.v/tt*100).toFixed(0)}%</span><div class="bar" style="flex:1"><i style="width:${(x.v/tt*100).toFixed(1)}%;background:var(--navy-700)"></i></div></div></td></tr>`).join("")+
      `</tbody></table></div>`;
  }

  // --- Exposición cambiaria ---
  let usdv=0,copv=0;
  cuentas.filter(c=>c.categoria!=="Ingreso").forEach(c=>{
    const r=regFor(c.id,last.y,last.m)||prevReg(c.id,last.y,last.m); if(!r||r.saldo==null) return;
    const v=toCcy(r.saldo,c.moneda,last.y,last.m,CCY)*(c.categoria==="Pasivo"?-1:1);
    if(c.moneda==="USD") usdv+=v; else copv+=v;
  });
  const fxtot=(usdv+copv)||1;
  html+=`<div class="sec-h"><h2>Exposición cambiaria</h2><span class="hint">en qué moneda está tu patrimonio</span></div>`;
  if(usdv/fxtot>0.85) html+=`<div class="cfg" style="background:var(--neg-soft);border-color:#E9C2C7;color:#7d2630">⚠ El ${(usdv/fxtot*100).toFixed(0)}% de tu patrimonio está en dólares: muy expuesto al movimiento del USD/COP.</div>`;
  html+=`<div class="card"><table><tbody>
    <tr><td><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#2056A6;margin-right:8px"></span>Dólar (USD)</td><td class="num">${fmt(usdv)}</td><td style="width:160px"><div class="rankbar"><span class="small muted">${(usdv/fxtot*100).toFixed(0)}%</span><div class="bar" style="flex:1"><i style="width:${(usdv/fxtot*100).toFixed(1)}%;background:#2056A6"></i></div></div></td></tr>
    <tr><td><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#3C7A3A;margin-right:8px"></span>Peso (COP)</td><td class="num">${fmt(copv)}</td><td style="width:160px"><div class="rankbar"><span class="small muted">${(copv/fxtot*100).toFixed(0)}%</span><div class="bar" style="flex:1"><i style="width:${(copv/fxtot*100).toFixed(1)}%;background:#3C7A3A"></i></div></div></td></tr>
  </tbody></table></div>`;

  // --- Concentración por cuenta ---
  const accs=cuentas.filter(c=>c.categoria==="Inversión").map(c=>{
    const r=regFor(c.id,last.y,last.m)||prevReg(c.id,last.y,last.m);
    return r&&r.saldo!=null?{n:c.nombre,v:toCcy(r.saldo,c.moneda,last.y,last.m,CCY)}:null;
  }).filter(Boolean).sort((a,b)=>b.v-a.v);
  const atot=accs.reduce((s,x)=>s+x.v,0)||1;
  if(accs.length){
    html+=`<div class="sec-h"><h2>Concentración por cuenta</h2><span class="hint">riesgo de cuenta única</span></div>`;
    if(accs[0].v/atot>0.30) html+=`<div class="cfg" style="background:var(--neg-soft);border-color:#E9C2C7;color:#7d2630">⚠ ${accs[0].n} concentra el ${(accs[0].v/atot*100).toFixed(0)}% de tu patrimonio. Una caída fuerte ahí te golpea de lleno.</div>`;
    html+=`<div class="card"><table><tbody>`+accs.map(x=>`<tr><td style="font-weight:600">${x.n}</td><td class="num">${fmt(x.v)}</td>
      <td style="width:170px"><div class="rankbar"><span class="small muted">${(x.v/atot*100).toFixed(0)}%</span><div class="bar" style="flex:1"><i style="width:${(x.v/atot*100).toFixed(1)}%;background:var(--brass)"></i></div></div></td></tr>`).join("")+`</tbody></table></div>`;
  }

  // --- Atribución del crecimiento (último mes con dato vs anterior) ---
  if(pers.length>=2){
    const prevP=pers[pers.length-2];
    const at=atribucion(prevP,last,CCY);
    const items=[{n:"Ahorro (aportes)",v:at.aportes,c:"#2056A6"},{n:"Mercado (valorización)",v:at.valoriz,c:"#1E7A5A"},{n:"Efecto cambiario (USD/COP)",v:at.fx,c:"#B0863A"}];
    const maxAbs=Math.max(1,...items.map(i=>Math.abs(i.v)));
    html+=`<div class="sec-h"><h2>¿De dónde vino tu crecimiento?</h2><span class="hint">${MESES[prevP.m]} → ${MESES[last.m]} ${last.y}</span></div>
      <div class="card"><table><tbody>`+items.map(i=>`<tr><td style="font-weight:600">${i.n}</td>
        <td class="num ${i.v>=0?'pos':'neg'}">${fmtSigned(i.v)}</td>
        <td style="width:160px"><div class="bar"><i style="width:${Math.abs(i.v)/maxAbs*100}%;background:${i.c};margin-left:${i.v>=0?'0':'auto'}"></i></div></td></tr>`).join("")+
        `<tr style="background:#FAFBFC"><td style="font-weight:700">Cambio total</td><td class="num ${at.total>=0?'pos':'neg'}" style="font-weight:700">${fmtSigned(at.total)}</td><td></td></tr>`+
        `</tbody></table><div class="legend" style="padding:10px 14px"><span>Separa cuánto creciste por meter plata, cuánto por desempeño del mercado, y cuánto por el movimiento del dólar. Lo único que mide tu acierto invirtiendo es <b>Mercado</b>.</span></div></div>`;
  }

  // --- Benchmark ---
  const bench=LS.get("bench",{inflacion:5.0,sp500:10.0});
  // rentabilidad anualizada de la cartera
  let valorizAcum=0, valorInv=0;
  cuentas.filter(c=>c.categoria==="Inversión").forEach(c=>{
    const ac=perfAcum(c.id,{upto:last}); if(ac.pnl) valorizAcum+=toCcy(ac.pnl,c.moneda,last.y,last.m,CCY);
    const r=regFor(c.id,last.y,last.m)||prevReg(c.id,last.y,last.m); if(r&&r.saldo!=null) valorInv+=toCcy(r.saldo,c.moneda,last.y,last.m,CCY);
  });
  const base=valorInv-valorizAcum;
  const retTotal = base>0? valorizAcum/base : null;
  const nMeses = pers.length;
  const anual = (retTotal!=null && nMeses>=2)? Math.pow(1+retTotal,12/nMeses)-1 : null;

  html+=`<div class="sec-h"><h2>Benchmark de rentabilidad</h2><span class="hint">tu cartera vs referencias (anualizado)</span></div>`;
  if(anual==null){
    html+=`<div class="card"><div class="empty">Necesitas al menos <b>dos meses</b> registrados para comparar tu rentabilidad anualizada. Vas en ${nMeses}.</div></div>`;
  }else{
    const rows=[{n:"Tu cartera",v:anual*100,col:"var(--navy)"},{n:"Inflación COP",v:+bench.inflacion,col:"var(--neg)"},{n:"S&P 500 (ref.)",v:+bench.sp500,col:"var(--brass)"}];
    const maxV=Math.max(...rows.map(r=>Math.abs(r.v)),1);
    html+=`<div class="card"><table><tbody>`+rows.map(r=>`<tr>
      <td style="font-weight:${r.n==='Tu cartera'?700:500}">${r.n}</td>
      <td class="num ${r.v>=0?'pos':'neg'}">${(r.v>=0?'+':'')+r.v.toFixed(1)}%</td>
      <td style="width:220px"><div class="bar" style="height:9px"><i style="width:${Math.abs(r.v)/maxV*100}%;background:${r.col}"></i></div></td></tr>`).join("")+`</tbody></table>
      <div class="toolbar" style="border-top:1px solid var(--line-soft);border-bottom:0">
        <div class="f"><label class="fl">Inflación COP anual %</label><input id="bInf" class="num-in" value="${bench.inflacion}"></div>
        <div class="f"><label class="fl">S&P 500 anual % (ref.)</label><input id="bSp" class="num-in" value="${bench.sp500}"></div>
        <button class="btn ghost sm" id="bSave">Guardar referencias</button>
      </div>
      <div class="legend" style="padding:0 14px 14px"><span>Tu rentabilidad real (descontando aportes/retiros), anualizada sobre ${nMeses} meses medidos. Las referencias son editables; cámbialas por los datos reales que manejes.</span></div></div>`;
  }

  document.getElementById("view").innerHTML=html+`<div class="sec-h"><h2>Cotizaciones cripto</h2><span class="hint">en vivo · USD</span></div><div class="card" id="cryptoBox"><div class="empty">Cargando precios…</div></div>`;
  // Precios cripto en vivo
  (async()=>{
    const syms=["BTC","ETH","SOL","BNB","XRP","ADA","DOGE","USDT"];
    const p=await fetchCryptoPrices(syms);
    const box=document.getElementById("cryptoBox"); if(!box) return;
    const keys=Object.keys(p);
    if(!keys.length){ box.innerHTML=`<div class="empty">No pude cargar precios ahora.</div>`; return; }
    box.innerHTML=`<table><tbody>`+syms.filter(s=>p[s]!=null).map(s=>`<tr><td style="font-weight:600">${s}</td>
      <td class="num">$${p[s].toLocaleString("es-CO",{maximumFractionDigits:p[s]<1?4:2})}</td>
      <td class="muted small">${CCY==="COP"?("≈ $"+Math.round(p[s]*rateFor(last.y,last.m)).toLocaleString("es-CO")+" COP"):""}</td></tr>`).join("")+`</tbody></table>
      <div class="legend" style="padding:10px 14px"><span>Fuente: CoinGecko. Para que una cuenta se cotice sola, edítala en Cuentas y pon sus tenencias (ej: BTC 1.5, ETH 10); luego usa “⟳ cotizar” en Registrar.</span></div>`;
  })();
  if(document.getElementById("bSave")) document.getElementById("bSave").onclick=()=>{
    LS.set("bench",{inflacion:parseFloat(document.getElementById("bInf").value)||0,sp500:parseFloat(document.getElementById("bSp").value)||0});
    toast("Referencias guardadas"); viewAnalisis();
  };

    <div style="display:flex;justify-content:space-between;font-size:13px"><span><b>${(prog*100).toFixed(1)}%</b> · ${fmtCcy(actual,mc)}</span><span class="muted">${faltante>0?("faltan "+fmtCcy(faltante,mc)):"superada"}</span></div>
    ${estado?`<div class="delta ${ecls}" style="margin-top:14px">${estado}</div>`:""}
  </div>
  <div class="grid" style="grid-template-columns:1fr 1fr 1fr;gap:14px;margin-top:16px">
    <div class="card" style="padding:16px"><div class="l" style="font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted-2);font-weight:600">Meses restantes</div><div class="num" style="font-size:22px;font-weight:600;margin-top:4px">${monthsRem>0?monthsRem:0}</div></div>
    <div class="card" style="padding:16px"><div class="l" style="font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted-2);font-weight:600">Ritmo necesario / mes</div><div class="num" style="font-size:22px;font-weight:600;margin-top:4px">${reqPace!=null&&reqPace>0?fmtCcy(reqPace,mc):"—"}</div></div>
    <div class="card" style="padding:16px"><div class="l" style="font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted-2);font-weight:600">Ritmo actual / mes</div><div class="num ${pace>=0?'pos':'neg'}" style="font-size:22px;font-weight:600;margin-top:4px">${pace!=null?fmtSigned2(pace,mc):"—"}</div></div>
  </div>

  <div style="display:flex;gap:8px;margin-top:16px"><button class="btn ghost sm" id="metaEdit">Editar meta</button><button class="btn danger sm" id="metaDel">Eliminar meta</button></div>

  $("#view").innerHTML=html;

/* ===== BITÁCORA Y RESPALDOS ===== */
function saludDatos(){
  const out=[]; const pers=periodsWithData();
  if(!pers.length){ out.push({ok:false,t:"Aún no has registrado ningún cierre."}); return out; }
  const first=pers[0], last=pers[pers.length-1];
  // huecos de meses
  let gaps=0, y=first.y,m=first.m;
  const has=(yy,mm)=>registros.some(r=>r.anio===yy&&r.mes===mm&&r.saldo!=null);
  while(y<last.y||(y===last.y&&m<last.m)){ m++; if(m>11){m=0;y++;} if(!(y===last.y&&m===last.m)&&!has(y,m)) gaps++; }
  out.push(gaps?{ok:false,t:`${gaps} mes(es) sin registrar entre tu primer y último cierre.`}:{ok:true,t:"Sin huecos en tu serie de meses."});
  // cuentas activas sin saldo en el último cierre
  const sinSaldo=cuentas.filter(c=>c.activa!==false&&c.categoria==="Inversión"&&!(regFor(c.id,last.y,last.m))).map(c=>c.nombre);
  out.push(sinSaldo.length?{ok:false,t:`${sinSaldo.length} cuenta(s) activa(s) sin saldo en ${MESES[last.m]} ${last.y}: ${sinSaldo.slice(0,4).join(", ")}${sinSaldo.length>4?"…":""}`}:{ok:true,t:`Todas las cuentas activas tienen saldo en el último cierre.`});
  // tasa del último mes
  out.push(tasas.some(t=>t.anio===last.y&&t.mes===last.m)?{ok:true,t:"El último cierre tiene su tasa USD/COP registrada."}:{ok:false,t:"Falta la tasa USD/COP del último cierre."});
  // mes actual cerrado
  const cal=new Date(); const cerrado=has(cal.getFullYear(),cal.getMonth());
  out.push(cerrado?{ok:true,t:`Cierre de ${MESES_L[cal.getMonth()]} ${cal.getFullYear()} registrado.`}:{ok:false,t:`Falta cerrar ${MESES_L[cal.getMonth()]} ${cal.getFullYear()}.`});
  return out;
}

  $("#view").innerHTML=saludHtml+`<div class="sec-h"><h2>Bitácora de cambios</h2><span class="hint">últimos 80 movimientos</span></div>`+logHtml+snapHtml;

  document.querySelectorAll(".restoreSnap").forEach(b=> b.onclick=async()=>{
    if(!confirm("Restaurar esta foto sobrescribe los saldos actuales con los de esa fecha (no borra cuentas nuevas). ¿Continuar?")) return;
    const data=await db.getSnapshot(b.dataset.id); if(!data){ toast("No pude leer el respaldo"); return; }

    await db.load(); toast("Respaldo restaurado"); viewBitacora();
  });
}

/* ---------- Arranque y sesión ---------- */
async function boot(){
  if(SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase){
    try{ supa=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY,
      {auth:{flowType:"implicit",detectSessionInUrl:true,persistSession:true,autoRefreshToken:true}});
      BACKEND="supa"; }catch(e){ BACKEND="local"; }
  }
  if(BACKEND==="supa"){
    const hash=new URLSearchParams(location.hash.replace(/^#/,""));
    const qs=new URLSearchParams(location.search);
    // Enlace caducado o ya usado
    if(hash.get("error")||qs.get("error")){
      renderLogin("El enlace expiró o ya se usó. Pide uno nuevo en “¿Olvidaste tu contraseña?”."); return;
    }
    // Enlace de recuperación válido → mostrar pantalla de nueva contraseña
    if(hash.get("type")==="recovery" || qs.get("type")==="recovery"){
      const at=hash.get("access_token"), rt=hash.get("refresh_token");
      if(at&&rt){ try{ await supa.auth.setSession({access_token:at,refresh_token:rt}); }catch(e){} }
      renderResetPassword(); return;
    }
    supa.auth.onAuthStateChange((event)=>{ if(event==="PASSWORD_RECOVERY") renderResetPassword(); });
    const {data:{session}} = await supa.auth.getSession();
    if(!session){ renderLogin(); return; }
    await startApp(session.user);
  }else{
    $("#cfgBanner").innerHTML=`<div class="cfg">Estás en <b>modo local</b> (los datos se guardan solo en este navegador). Para sincronizar entre tu celular y computador y entrar desde cualquier PC, pega tus credenciales de Supabase en la sección CONFIGURACIÓN del archivo y publícalo en GitHub Pages.</div>`;
    syncCcyUI();
    await db.load(); await seedIfEmpty(); render();
  }
}

async function startApp(user){
  $("#status").innerHTML='<span class="dot"></span><span>'+((user&&user.email)||"Conectado")+'</span>';
  $("#tabs").style.display="";
  const lo=$("#logoutBtn"); lo.style.display=""; lo.onclick=async()=>{ await supa.auth.signOut(); location.reload(); };
  syncCcyUI();
  await db.load(); await seedIfEmpty(); render();
  subscribeRealtime();
}

let _rtTimer=null, _rtChannel=null;
function subscribeRealtime(){
  if(BACKEND!=="supa" || _rtChannel) return;
  try{
    _rtChannel = supa.channel("patrimonio-db")
      .on("postgres_changes",{event:"*",schema:"public",table:"registros"},onRemoteChange)
      .on("postgres_changes",{event:"*",schema:"public",table:"cuentas"},onRemoteChange)
      .on("postgres_changes",{event:"*",schema:"public",table:"tasas"},onRemoteChange)
      .subscribe();
  }catch(e){}
}
function onRemoteChange(){
  // No refrescar mientras el usuario está escribiendo en pantallas de captura
  if(["registrar","cuentas","ingresos"].includes(TAB)) return;
  clearTimeout(_rtTimer);
  _rtTimer=setTimeout(async()=>{ await db.load(); render(); }, 600);
}

    const redirectTo=location.origin+location.pathname;
    const {error}=await supa.auth.resetPasswordForEmail(email,{redirectTo});
    if(error){ $("#fgErr").textContent="No se pudo enviar. Revisa el correo e inténtalo de nuevo."; $("#fgBtn").textContent="Enviar enlace"; return; }
    authShell(`<p style="margin:0 0 6px;font-weight:600">Revisa tu correo</p>
      <p class="muted small">Te enviamos un enlace a <b>${email}</b> para crear tu contraseña nueva. Si no lo ves, mira en spam.</p>
      <button class="btn ghost" id="fgDone" style="width:100%;margin-top:18px">Volver</button>`);
    $("#fgDone").onclick=renderLogin;
  };
}

function renderResetPassword(){
  authShell(`
    <p style="margin:0 0 6px;font-weight:600">Nueva contraseña</p>
    <label class="fl">Contraseña nueva</label>
    <input id="rpPass" type="password" autocomplete="new-password" placeholder="mínimo 6 caracteres">
    <label class="fl">Repítela</label>
    <input id="rpPass2" type="password" autocomplete="new-password" placeholder="••••••••">
    <button class="btn primary" id="rpBtn">Guardar contraseña</button>
    <div class="login-err" id="rpErr"></div>`);
  $("#rpBtn").onclick=async()=>{
    const p=$("#rpPass").value, p2=$("#rpPass2").value;
    if(p.length<6){ $("#rpErr").textContent="Mínimo 6 caracteres."; return; }
    if(p!==p2){ $("#rpErr").textContent="Las dos contraseñas no coinciden."; return; }
    $("#rpBtn").textContent="Guardando…"; $("#rpErr").textContent="";
    const {error}=await supa.auth.updateUser({password:p});
    if(error){ $("#rpErr").textContent="No se pudo cambiar. Pide un enlace nuevo desde “¿Olvidaste tu contraseña?”."; $("#rpBtn").textContent="Guardar contraseña"; return; }
    history.replaceState(null,"",location.origin+location.pathname);
    const {data:{user}}=await supa.auth.getUser();
    toast("Contraseña actualizada"); await startApp(user);
  };
}
boot();

// Botón instalar (PWA)
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",e=>{ e.preventDefault(); deferredPrompt=e;
  const b=document.getElementById("installBtn"); if(b) b.style.display=""; });
(function(){
  const b=document.getElementById("installBtn"); if(!b) return;
  const isiOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const standalone=window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;
  if(isiOS && !standalone){ b.style.display=""; }
  b.onclick=async()=>{
    if(deferredPrompt){ deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; b.style.display="none"; }
    else if(isiOS){ alert("Para instalar en iPhone: toca el botón Compartir y luego “Agregar a pantalla de inicio”."); }
    else { alert("Abre el menú del navegador y elige “Instalar app” o “Agregar a pantalla de inicio”."); }
  };
})();

// Service worker (PWA instalable + carga rápida)
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
}
</script>
